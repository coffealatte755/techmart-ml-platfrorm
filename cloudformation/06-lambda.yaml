AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TechMart - Lambda functions: techmart-ml-prediction & techmart-ml-forecasting
  (Python 3.13), memuat model dari S3 models/hybrid_model.pkl dan cache di /tmp,
  hasil inferensi dicatat ke DynamoDB (MLPredictionResults / MLForecastResults).

Parameters:
  DataLakeBucketName:
    Type: String
  LambdaCodeS3Bucket:
    Type: String
    Description: Bucket tempat lambda.zip diupload (bisa sama dengan data lake bucket)
  PredictionCodeS3Key:
    Type: String
    Default: lambda/prediction.zip
  ForecastingCodeS3Key:
    Type: String
    Default: lambda/forecasting.zip

Resources:

  TechMartPredictionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: techmart-ml-prediction
      Runtime: python3.13
      Handler: lambda_function.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref PredictionCodeS3Key
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataLakeBucketName
          MODEL_KEY: models/hybrid_model.pkl
          RESULT_TABLE: MLPredictionResults

  TechMartForecastingFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: techmart-ml-forecasting
      Runtime: python3.13
      Handler: lambda_function.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref ForecastingCodeS3Key
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataLakeBucketName
          MODEL_KEY: models/hybrid_model.pkl
          RESULT_TABLE: MLForecastResults

  PredictionFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TechMartPredictionFunction
      Principal: apigateway.amazonaws.com

  ForecastingFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TechMartForecastingFunction
      Principal: apigateway.amazonaws.com

Outputs:
  PredictionFunctionArn:
    Value: !GetAtt TechMartPredictionFunction.Arn
    Export:
      Name: techmart-prediction-fn-arn
  ForecastingFunctionArn:
    Value: !GetAtt TechMartForecastingFunction.Arn
    Export:
      Name: techmart-forecasting-fn-arn
